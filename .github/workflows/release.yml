name: release

# Сборка установщиков при пуше тега вида v1.2.3
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          # macOS — единый universal-бинарник (Intel + Apple Silicon).
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          # flatpak/shared-modules — рецепт libappindicator для трея (нужен Linux-ноге).
          submodules: recursive

      - name: Системные зависимости (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      # Для universal-сборки нужны обе цели macOS.
      - name: Rust targets (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Кэш Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Зависимости фронтенда
        run: npm ci

      - name: Sidecar-бинарники (yt-dlp + ffmpeg)
        run: npm run fetch-binaries
        env:
          # На macOS собираем universal-сайдкары (lipo arm64 + x86_64).
          MESTIA_MAC_UNIVERSAL: ${{ matrix.platform == 'macos-latest' && '1' || '' }}

      # По умолчанию сборка macOS ad-hoc-подписана (signingIdentity "-") — работает
      # только после `xattr -cr` у пользователя. Если в секретах задан Developer ID
      # (APPLE_SIGNING_IDENTITY), подменяем идентичность в конфиге, и связка секретов
      # ниже включает полноценную подпись + нотаризацию (Gatekeeper пропустит без плясок).
      - name: macOS — включить Developer ID при наличии сертификата
        if: matrix.platform == 'macos-latest'
        env:
          ID: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$ID" ]; then
            node -e "const f='src-tauri/tauri.conf.json';const c=require('./'+f);c.bundle.macOS.signingIdentity=process.env.ID;require('fs').writeFileSync(f,JSON.stringify(c,null,2)+'\n')"
            echo "signingIdentity → Developer ID (нотаризация включена)"
          else
            echo "APPLE_SIGNING_IDENTITY не задан — остаётся ad-hoc (-); см. README про xattr"
          fi

      - name: Сборка и релиз
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Подпись апдейтера — приватный ключ и пароль из секретов репозитория.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Подпись и нотаризация macOS. Активны, только если секреты заданы; иначе
          # tauri-action их игнорирует и оставляет ad-hoc. Нужны все шесть:
          # APPLE_CERTIFICATE (base64 .p12), APPLE_CERTIFICATE_PASSWORD,
          # APPLE_SIGNING_IDENTITY ("Developer ID Application: …"), APPLE_ID,
          # APPLE_PASSWORD (app-specific), APPLE_TEAM_ID.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mestia ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          # Для macOS — universal; на остальных пусто.
          args: ${{ matrix.args }}
          # Генерировать и прикладывать latest.json к релизу (нужно апдейтеру).
          includeUpdaterJson: true

      # ── Flatpak для Steam Deck / Linux ────────────────────────────────────────
      # Заворачиваем собранный .deb в Flatpak с рантаймом GNOME (внутри WebKitGTK),
      # чтобы приложение работало на SteamOS, где системного webkit2gtk нет.
      - name: Сборка Flatpak (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//47 org.gnome.Sdk//47
          cp src-tauri/target/release/bundle/deb/*.deb flatpak/mestia.deb
          flatpak-builder --user --install-deps-from=flathub --force-clean \
            --repo=repo flatpak-build flatpak/com.mestia.app.yml
          # Имя с версией (из package.json), в стиле остальных артефактов.
          VERSION=$(node -p "require('./package.json').version")
          flatpak build-bundle repo "Mestia_${VERSION}_x86_64.flatpak" com.mestia.app \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Прикрепить Flatpak к релизу
        if: matrix.platform == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" Mestia_*_x86_64.flatpak --clobber

  # ── Версионное имя updater-артефакта macOS ────────────────────────────────────
  # Tauri называет его без версии (Mestia_universal.app.tar.gz). Приводим к стилю
  # остальных ассетов (Mestia_<ver>_universal.app.tar.gz) и СИНХРОННО правим ссылку
  # в latest.json — иначе автообновление на macOS сломётся (404). Запускаем после
  # всех сборок, чтобы latest.json уже был полностью собран по всем платформам.
  rename-mac-updater:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      TAG: ${{ github.ref_name }}
    steps:
      - name: Переименовать и поправить latest.json
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          OLD="Mestia_universal.app.tar.gz"
          NEW="Mestia_${VER}_universal.app.tar.gz"
          # Артефакта нет (mac-нога не собиралась) или уже переименован — выходим спокойно.
          if ! gh release view "$TAG" --json assets -q '.assets[].name' | grep -Fqx "$OLD"; then
            echo "::notice::$OLD не найден — пропускаю переименование."
            exit 0
          fi
          gh release download "$TAG" --pattern "$OLD" --pattern "$OLD.sig" --pattern "latest.json"
          mv "$OLD" "$NEW"
          mv "$OLD.sig" "$NEW.sig"
          # В latest.json правим только имя архива (подпись лежит inline, имя .sig не упоминается).
          sed -i "s/Mestia_universal\.app\.tar\.gz/${NEW}/g" latest.json
          gh release upload "$TAG" "$NEW" "$NEW.sig" latest.json --clobber
          gh release delete-asset "$TAG" "$OLD" -y
          gh release delete-asset "$TAG" "$OLD.sig" -y
          echo "::notice::Готово: $NEW + обновлён latest.json."
