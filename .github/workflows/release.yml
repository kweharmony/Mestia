name: release

# Сборка установщиков при пуше тега вида v1.2.3
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          # macOS — единый universal-бинарник (Intel + Apple Silicon).
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Системные зависимости (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      # Для universal-сборки нужны обе цели macOS.
      - name: Rust targets (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Кэш Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Зависимости фронтенда
        run: npm ci

      - name: Sidecar-бинарники (yt-dlp + ffmpeg)
        run: npm run fetch-binaries
        env:
          # На macOS собираем universal-сайдкары (lipo arm64 + x86_64).
          MESTIA_MAC_UNIVERSAL: ${{ matrix.platform == 'macos-latest' && '1' || '' }}

      - name: Сборка и релиз
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Подпись апдейтера — приватный ключ и пароль из секретов репозитория.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mestia ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          # Для macOS — universal; на остальных пусто.
          args: ${{ matrix.args }}
          # Генерировать и прикладывать latest.json к релизу (нужно апдейтеру).
          includeUpdaterJson: true

      # ── Flatpak для Steam Deck / Linux ────────────────────────────────────────
      # Заворачиваем собранный .deb в Flatpak с рантаймом GNOME (внутри WebKitGTK),
      # чтобы приложение работало на SteamOS, где системного webkit2gtk нет.
      - name: Сборка Flatpak (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//47 org.gnome.Sdk//47
          cp src-tauri/target/release/bundle/deb/*.deb flatpak/mestia.deb
          flatpak-builder --user --install-deps-from=flathub --force-clean \
            --repo=repo flatpak-build flatpak/com.mestia.app.yml
          # Имя с версией (из package.json), в стиле остальных артефактов.
          VERSION=$(node -p "require('./package.json').version")
          flatpak build-bundle repo "Mestia_${VERSION}_x86_64.flatpak" com.mestia.app \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Прикрепить Flatpak к релизу
        if: matrix.platform == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" Mestia_*_x86_64.flatpak --clobber
