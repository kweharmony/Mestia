# Flatpak-манифест для Steam Deck / Linux.
# Берёт готовый .deb (собранный `tauri build`) и заворачивает его в Flatpak с
# рантаймом GNOME, который содержит WebKitGTK — поэтому не нужен системный
# libwebkit2gtk (его нет на SteamOS из коробки).
#
# Локальная сборка:
#   cp src-tauri/target/release/bundle/deb/*.deb flatpak/mestia.deb
#   flatpak-builder --user --install-deps-from=flathub --force-clean \
#     --repo=repo flatpak-build flatpak/com.mestia.app.yml
#   flatpak build-bundle repo Mestia.flatpak com.mestia.app

id: com.mestia.app
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
command: mestia

# Полный набор кодеков ffmpeg для GStreamer/WebKitGTK — иначе встроенный плеер
# не декодирует H.264/AAC (в базовом рантайме их нет из-за патентов). Расширение
# подтягивается автоматически при установке. Версия совпадает с базой GNOME 47
# (freedesktop 24.08).
add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    version: "24.08"
    add-ld-path: .
    no-autodownload: false
    autodelete: false

finish-args:
  - --share=ipc
  - --share=network              # yt-dlp / проверка обновлений
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri                 # аппаратный рендер (важно для AMD GPU Деки)
  # WebKitGTK на SteamOS (AMD) падает при старте из-за DMABUF-рендерера —
  # отключаем его, иначе приложение вылетает сразу при открытии окна.
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1
  - --socket=pulseaudio          # звук в плеере
  - --filesystem=home            # папка загрузок / медиатека (по умолчанию в ~)
  - --filesystem=/run/media      # microSD / внешние диски (Steam Deck монтирует сюда)
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: mestia
    buildsystem: simple
    sources:
      - type: file
        path: mestia.deb
      - type: file
        path: com.mestia.app.desktop
    build-commands:
      - ar x *.deb
      - tar xf data.tar.*
      - mkdir -p /app/bin
      # Точка монтирования расширения ffmpeg-full (кодеки для плеера).
      - mkdir -p /app/lib/ffmpeg
      # Главный бинарь + sidecar'ы (yt-dlp/ffmpeg/ffprobe) лежат в usr/bin.
      - cp -a usr/bin/. /app/bin/
      # Имя главного бинаря зависит от productName — приводим к фиксированному.
      - if [ -f /app/bin/Mestia ]; then mv /app/bin/Mestia /app/bin/mestia; fi
      - install -Dm644 com.mestia.app.desktop /app/share/applications/com.mestia.app.desktop
      # metainfo.xml намеренно НЕ ставим: старый flatpak-builder зовёт appstream-compose,
      # которого нет в свежем GNOME SDK. Для бокового .flatpak он не нужен; вернуть при
      # публикации на Flathub (с современным flatpak-builder).
      # Иконки из .deb (Mestia.png) переименовываем в app-id, как требует Flatpak.
      - for s in 32x32 128x128 128x128@2x; do src="usr/share/icons/hicolor/$s/apps/Mestia.png"; [ -f "$src" ] && install -Dm644 "$src" "/app/share/icons/hicolor/$s/apps/com.mestia.app.png" || true; done
